<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstateScout</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="components/home.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body>
    <div class="header">
        <div class="menu-bg header-nav">
            <div class="left-nav">
                <a href="#" onclick="showHome(event)">
                    <span class="material-icons">home</span>
                    <span>Strona główna</span>
                </a>
                <a href="#" onclick="showMap(event)">
                    <span class="material-icons">location_on</span>
                    <span>Mapa ofert</span>
                </a>
                <a href="#">O nas</a>
            </div>
            <div class="logo-container">
                <img src="logo.png" alt="Logo Twojej Firmy" class="logo">
            </div>
            <div class="right-nav">
                <a href="#">
                    <span class="material-icons">person</span>
                    <span>Zaloguj</span>
                </a>
                <a href="#">Stwórz konto</a>
            </div>
        </div>
    </div>

    <div id="mapContainer" class="map-container" style="display: none;">
        <iframe id="mapFrame" src="real_estate_map.html" frameborder="0"></iframe>
    </div>
    <div id="home-placeholder"></div>
</body>

<script>
    fetch('components/home.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('home-placeholder').innerHTML = data;
        });

    function showMap(event) {
        event.preventDefault();
        const mapContainer = document.getElementById('mapContainer');
        const homeContainer = document.getElementById('home-placeholder');

        mapContainer.style.display = 'block';
        homeContainer.style.display = 'none';
    }

    function showHome(event) {
        event.preventDefault();
        const mapContainer = document.getElementById('mapContainer');
        const homeContainer = document.getElementById('home-placeholder');

        mapContainer.style.display = 'none';
        homeContainer.style.display = 'block';
    }
</script>

</html>
