<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Mapa ofert nieruchomości</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.1/dist/css/leaflet.extra-markers.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="real_estate_map.css">
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.1/dist/js/leaflet.extra-markers.min.js"></script>
    <script>
        var map = L.map('map').setView([54.37, 18.63], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Funkcja do obliczenia ceny za metr kwadratowy
        function calculatePricePerSqm(price, size) {
            const priceNum = parseFloat(price.replace(/[^\d]/g, ''));
            const sizeNum = parseFloat(size.replace(/[^\d]/g, ''));
            return sizeNum > 0 ? priceNum / sizeNum : 0;
        }

        // Funkcja do określenia koloru na podstawie ceny za m²
        function getColorByPrice(pricePerSqm) {
            // Skala kolorów na podstawie analizy danych:
            // Zielony: < 8000 PLN/m² (tanie)
            // Żółty: 8000-15000 PLN/m² (średnie)
            // Czerwony: > 15000 PLN/m² (drogie)

            if (pricePerSqm < 8000) {
                return '#4CAF50'; // Zielony
            } else if (pricePerSqm < 15000) {
                return '#FFC107'; // Żółty
            } else {
                return '#F44336'; // Czerwony
            }
        }

        fetch('../../ScraperOutput/morizon_data.csv')
            .then(response => response.text())
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function (results) {
                        results.data.forEach(function (row) {
                            if (row.coords) {
                                const [lat, lng] = row.coords.split(',').map(coord => parseFloat(coord));
                                if (!isNaN(lat) && !isNaN(lng)) {
                                    const pricePerSqm = calculatePricePerSqm(row.price_pln, row.size_m2);
                                    const iconColor = getColorByPrice(pricePerSqm);

                                    const popupContent = `
                                        <b>Ulica:</b> ${row.street}<br>
                                        <b>Cena:</b> ${row.price_pln} PLN<br>
                                        <b>Powierzchnia:</b> ${row.size_m2}<br>
                                        <b>Cena za m²:</b> ${Math.round(pricePerSqm).toLocaleString()} PLN/m²<br>
                                        <b>Pokoje:</b> ${row.rooms}<br>
                                        <b>Piętro:</b> ${row.floor}<br>
                                        <b>Rok budowy:</b> ${row.year_built}<br>
                                        <a href="${row.detail_url}" target="_blank">Zobacz ofertę</a>
                                    `;

                                    var homeIcon = L.divIcon({
                                        className: `custom-home-icon ${getPriceClass(pricePerSqm)}`,
                                        html: '<span class="material-icons">home</span>',
                                        iconSize: [30, 30],
                                        iconAnchor: [15, 15],
                                        popupAnchor: [0, -15]
                                    });

                                    // Dodaj funkcję do określenia klasy CSS
                                    function getPriceClass(pricePerSqm) {
                                        if (pricePerSqm < 8000) {
                                            return 'price-low';
                                        } else if (pricePerSqm < 15000) {
                                            return 'price-medium';
                                        } else {
                                            return 'price-high';
                                        }
                                    }

                                    L.marker([lat, lng], { icon: homeIcon }).addTo(map).bindPopup(popupContent);
                                }
                            }
                        });
                    }
                });
            });
    </script>
</body>

</html>
