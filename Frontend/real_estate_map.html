<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Mapa ofert nieruchomości</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.1/dist/css/leaflet.extra-markers.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        #map {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        html {
            overflow: hidden;
        }

        .custom-home-icon {
            background-color: #3f3172;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.1/dist/js/leaflet.extra-markers.min.js"></script>
    <script>
        var map = L.map('map').setView([54.37, 18.63], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var customIcon = L.icon({
            iconUrl: 'marker-icon.png',
            shadowUrl: 'marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        fetch('../ScraperOutput/morizon_data.csv')
            .then(response => response.text())
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function (results) {
                        results.data.forEach(function (row) {
                            if (row.coords) {
                                const [lat, lng] = row.coords.split(',').map(coord => parseFloat(coord));
                                if (!isNaN(lat) && !isNaN(lng)) {
                                    const popupContent = `
                                        <b>Ulica:</b> ${row.street}<br>
                                        <b>Cena:</b> ${row.price_pln} PLN<br>
                                        <b>Powierzchnia:</b> ${row.size_m2}<br>
                                        <b>Pokoje:</b> ${row.rooms}<br>
                                        <b>Piętro:</b> ${row.floor}<br>
                                        <b>Rok budowy:</b> ${row.year_built}<br>
                                        <a href="${row.detail_url}" target="_blank">Zobacz ofertę</a>
                                    `;
                                    var homeIcon = L.divIcon({
                                        className: 'custom-home-icon',
                                        html: '<span class="material-icons">home</span>',
                                        iconSize: [30, 30],
                                        iconAnchor: [15, 15],
                                        popupAnchor: [0, -15]
                                    });

                                    L.marker([lat, lng], { icon: homeIcon }).addTo(map).bindPopup(popupContent);
                                }
                            }
                        });
                    }
                });
            });
    </script>
</body>

</html>
